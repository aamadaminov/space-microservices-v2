processors:
  batch:
    # Batching improves compression and reduces network requests
    send_batch_size: 1024
    timeout: 10s
  memory_limiter:
    limit_mib: 512
    check_interval: 10s


exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
  otlp/jaeger:
    endpoint: jaeger01:14317
    tls:
      insecure: true

# extensions:
#   health_check:
#     endpoint: 0.0.0.0:13133
#   pprof:
#     endpoint: 0.0.0.0:1777
#   zpages:
#     endpoint: 0.0.0.0:55679

service:
  pipelines:
    traces:
      receivers: [otlp/apps]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [prometheus]
      processors: [batch, memory_limiter]
      exporters: [prometheus]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888

