receivers:
  otlp/apps:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: 'gencoords'
          scrape_interval: 30s
          scheme: http
          metrics_path: metrics
          static_configs:
            - targets: ['gencoords:2223']
          metric_relabel_configs:
            - source_labels: [ __name__ ]
              target_label: GENCOORDS
        - job_name: 'gencoords-node'
          scrape_interval: 30s
          scheme: http
          metrics_path: metrics
