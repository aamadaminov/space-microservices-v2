global:
  scrape_interval: 1m

scrape_configs:
  - job_name: 'prometheus01'
    scrape_interval: 30s
    static_configs:
      - targets: ['0.0.0.0:9090']
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        target_label: PROMETHEUS01

  - job_name: 'otel01'
    scrape_interval: 30s
    static_configs:
      - targets: ['otel01:8888']
    metric_relabel_configs:
      - source_labels: [ __name__ ]
        target_label: OTEL01

  - job_name: 'otel01-apps'
    scrape_interval: 30s
    static_configs:
      - targets: ['otel01:8889']
